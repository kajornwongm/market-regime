<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Regime Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0f;--bg2:#0e1117;--bg3:#141820;--bg4:#1c2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#d4d8e2;--muted:#5a6070;--dim:#2e3444;
  --green:#00d4a0;--blue:#4d9fff;--amber:#f0a500;--red:#ff5555;--purple:#a78bfa;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
.shell{max-width:1400px;margin:0 auto;padding:1.5rem}

header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.logo{font-family:var(--mono);font-size:1.1rem;font-weight:500;letter-spacing:.05em}
.logo span{color:var(--green)}
.meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;line-height:1.9}
.live{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Regime hero */
.regime-hero{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.5rem 2rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.regime-label{font-size:1.4rem;font-weight:600}
.regime-score{font-family:var(--mono);font-size:3rem;font-weight:300;color:var(--green);line-height:1}
.strat span{color:var(--text);display:inline-block;margin:.15rem .3rem .15rem 0;padding:2px 8px;background:var(--bg3);border-radius:4px;border:1px solid var(--border2);font-size:12px}

/* Score cards */
.scores-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.sc-name{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sc-val{font-family:var(--mono);font-size:22px;margin-bottom:6px}
.sc-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .6s}
.sc-interp{font-size:11px;color:var(--muted);margin-top:5px}

/* MA row */
.ma-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.ma-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-family:var(--mono);font-size:12px;border:1px solid var(--border)}
.ma-pill.bullish{background:rgba(0,212,160,.08);border-color:rgba(0,212,160,.2)}
.ma-pill.bearish{background:rgba(255,85,85,.08);border-color:rgba(255,85,85,.2)}
.ma-pill.neutral{background:var(--bg2)}
.ma-dot{width:7px;height:7px;border-radius:50%}
.ma-dot.bullish{background:var(--green)}.ma-dot.bearish{background:var(--red)}.ma-dot.neutral{background:var(--muted)}

/* Alerts */
.alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem}
.alert{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:8px;font-size:12px;font-family:var(--mono)}
.alert.warning{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);color:var(--amber)}
.alert.alert{background:rgba(255,85,85,.07);border:1px solid rgba(255,85,85,.2);color:var(--red)}
.alert.info{background:rgba(77,159,255,.07);border:1px solid rgba(77,159,255,.15);color:var(--blue)}

/* Flow overview — 2 sections side by side */
.flow-overview{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-title{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Flow bars */
.flow-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.flow-row:last-child{border-bottom:none}
.fl-label{font-size:13px;min-width:100px}
.fl-sub{font-size:11px;color:var(--muted);min-width:40px;font-family:var(--mono)}
.fl-bar-wrap{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.fl-bar{height:100%;border-radius:3px}
.fl-val{font-family:var(--mono);font-size:12px;min-width:80px;text-align:right}
.fl-badge{font-size:10px;padding:1px 6px;border-radius:4px;font-family:var(--mono);min-width:40px;text-align:center}
.fl-badge.in{background:rgba(0,212,160,.12);color:var(--green)}
.fl-badge.out{background:rgba(255,85,85,.1);color:var(--red)}

/* Country & Sector */
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.c-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.c-row:last-child{border-bottom:none}
.c-flag{font-size:15px;min-width:22px}
.c-name{flex:1;font-size:13px}
.c-val{font-family:var(--mono);font-size:12px;min-width:52px;text-align:right}
.c-ma{font-size:10px;padding:1px 7px;border-radius:4px;font-family:var(--mono)}
.c-ma.bullish{background:rgba(0,212,160,.12);color:var(--green)}
.c-ma.bearish{background:rgba(255,85,85,.1);color:var(--red)}
.c-ma.neutral{background:var(--bg3);color:var(--muted)}
.c-flow{font-family:var(--mono);font-size:11px;min-width:72px;text-align:right}
.s-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.s-row:last-child{border-bottom:none}
.s-rank{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:18px}
.s-name{flex:1;font-size:13px}
.s-bar-wrap{width:80px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.s-bar{height:100%;border-radius:2px}
.s-rs{font-family:var(--mono);font-size:12px;min-width:50px;text-align:right}

.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}
.flow-notice{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:1.25rem}
.flow-notice strong{color:var(--amber)}
#loading{text-align:center;padding:5rem;font-family:var(--mono);color:var(--muted)}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
#error{display:none;background:#3d0a0a;border:1px solid var(--red);border-radius:10px;padding:12px 16px;font-family:var(--mono);font-size:12px;color:var(--red);margin-bottom:1rem}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">Market<span>Regime</span></div>
    <div class="meta" id="metaBar"><span class="live"></span>loading...</div>
  </header>
  <div id="error"></div>
  <div id="loading"><div class="spinner"></div><br>Loading...</div>
  <div id="app" style="display:none">
    <div class="regime-hero" id="hero"></div>
    <div class="scores-grid" id="scores"></div>
    <div id="maRow" class="ma-row"></div>
    <div id="alerts" class="alerts"></div>
    <div id="flowNotice" class="flow-notice" style="display:none"></div>
    <div id="flowOverview" class="flow-overview" style="display:none">
      <div class="card">
        <div class="card-title">Asset class flow (4W)</div>
        <div id="assetFlows"></div>
      </div>
      <div class="card">
        <div class="card-title">Equity region flow (4W)</div>
        <div id="regionFlows"></div>
      </div>
    </div>
    <div class="main-grid">
      <div class="card">
        <div class="card-title">Country signals</div>
        <div id="countries"></div>
      </div>
      <div class="card">
        <div class="card-title">Sector leadership</div>
        <div id="sectors"></div>
      </div>
    </div>
  </div>
</div>
<script>
const DATA_URL="data/latest.json";
let D=null;
const sc=v=>v>=0?"pos":"neg";
const fmt=(v,d=1)=>(v>=0?"+":"")+v.toFixed(d)+"%";
const fmtB=v=>{const a=Math.abs(v);return (v>=0?"+":"-")+"$"+(a>=1000?(a/1000).toFixed(1)+"B":a.toFixed(0)+"M")};
const scoreColor=s=>s>=65?"#00d4a0":s>=45?"#4d9fff":s<25?"#ff5555":"#f0a500";
const maCls=s=>s==="bullish"?"bullish":s==="bearish"?"bearish":"neutral";

async function load(){
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now());
    if(!r.ok)throw new Error("HTTP "+r.status);
    D=await r.json();render();
  }catch(e){
    document.getElementById("loading").style.display="none";
    const el=document.getElementById("error");
    el.style.display="block";
    el.textContent="Cannot load data/latest.json — run GitHub Actions first.";
  }
}

function render(){
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  const ts=D.generated_at.replace("T"," ").slice(0,16)+" UTC";
  const flowInfo=D.flow_updated
    ?`${D.n_asset_classes} asset classes · ${D.n_flow_tickers} ETFs`+
     (D.flow_date?` · data: ${D.flow_date}`:"")
    :"price-only mode";
  document.getElementById("metaBar").innerHTML=
    `<span class="live"></span>${ts}<br>Flow: ${flowInfo}`;
  renderHero();renderScores();renderMA();renderAlerts();
  renderFlowOverview();renderCountries();renderSectors();
}

function renderHero(){
  const r=D.regime;
  const c=scoreColor(r.composite);
  const strat=D.strategy.map(s=>`<span>${s}</span>`).join("");
  document.getElementById("hero").innerHTML=`
    <div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.08em">MARKET REGIME</div>
      <div class="regime-label">${r.label}</div>
      <div class="strat" style="margin-top:8px">${strat}</div>
    </div>
    <div style="text-align:right">
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:2px">COMPOSITE</div>
      <div class="regime-score" style="color:${c}">${r.composite.toFixed(0)}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px">/ 100</div>
    </div>`;
}

function renderScores(){
  const s=D.regime.scores;
  const interp={
    growth:   s.growth>65?"Growth regime":s.growth<35?"Value regime":"Neutral",
    risk:     s.risk>65?"Risk-on":s.risk<35?"Risk-off":"Neutral",
    inflation:s.inflation>65?"Inflation":s.inflation<35?"Disinflation":"Neutral",
    liquidity:s.liquidity>65?"Easing":s.liquidity<35?"Tightening":"Neutral",
    sector:   s.sector>65?"Strong leadership":"Mixed",
  };
  document.getElementById("scores").innerHTML=Object.entries(s).map(([k,v])=>{
    const c=scoreColor(v);
    return`<div class="sc">
      <div class="sc-name">${k}</div>
      <div class="sc-val" style="color:${c}">${v.toFixed(0)}</div>
      <div class="sc-track"><div class="sc-fill" style="width:${v}%;background:${c}"></div></div>
      <div class="sc-interp">${interp[k]}</div>
    </div>`;
  }).join("");
}

function renderMA(){
  document.getElementById("maRow").innerHTML=Object.entries(D.ma_signals).map(([t,s])=>
    `<div class="ma-pill ${maCls(s)}">
      <div class="ma-dot ${maCls(s)}"></div>
      <span style="font-weight:500">${t}</span>
      <span style="color:var(--muted)">${s}</span>
    </div>`
  ).join("");
}

function renderAlerts(){
  const el=document.getElementById("alerts");
  if(!D.alerts.length){el.style.display="none";return;}
  const icons={alert:"⚠",warning:"◈",info:"◉"};
  el.innerHTML=D.alerts.map(a=>
    `<div class="alert ${a.level}">
      <span>${icons[a.level]||"·"}</span><span>${a.msg}</span>
    </div>`
  ).join("");
}

function renderFlowOverview(){
  const af=D.asset_flows||{};
  const rf=D.region_flows||{};
  if(!D.flow_updated||(!Object.keys(af).length&&!Object.keys(rf).length)){
    document.getElementById("flowNotice").style.display="block";
    document.getElementById("flowNotice").innerHTML=
      `<strong>Flow data not loaded.</strong> Download CSVs from etfdb.com → rename as <code>equity_YYYY-MM-DD.csv</code>, <code>bond_YYYY-MM-DD.csv</code> etc → place in <code>data/flows/</code> → re-run Actions.`;
    return;
  }
  document.getElementById("flowOverview").style.display="grid";

  // Asset class flows
  const afSorted=Object.entries(af).sort((a,b)=>Math.abs(b[1].flow_4w_mn)-Math.abs(a[1].flow_4w_mn));
  const maxAF=Math.max(...afSorted.map(([,v])=>Math.abs(v.flow_4w_mn)),1);
  document.getElementById("assetFlows").innerHTML=afSorted.map(([ac,f])=>{
    const pos=f.flow_4w_mn>=0;
    const w=Math.abs(f.flow_4w_mn)/maxAF*100;
    const clr=pos?"var(--green)":"var(--red)";
    return`<div class="flow-row">
      <div class="fl-label">${ac}</div>
      <div class="fl-sub" style="color:var(--muted)">${f.n_etfs}e</div>
      <div class="fl-bar-wrap"><div class="fl-bar" style="width:${w}%;background:${clr}"></div></div>
      <div class="fl-val ${pos?"pos":"neg"}">${fmtB(f.flow_4w_mn)}</div>
      <div class="fl-badge ${pos?"in":"out"}">${pos?"inflow":"outflow"}</div>
    </div>`;
  }).join("");

  // Region flows
  const rfSorted=Object.entries(rf).sort((a,b)=>b[1].flow_4w_mn-a[1].flow_4w_mn);
  const maxRF=Math.max(...rfSorted.map(([,v])=>Math.abs(v.flow_4w_mn)),1);
  document.getElementById("regionFlows").innerHTML=rfSorted.map(([reg,f])=>{
    const pos=f.flow_4w_mn>=0;
    const w=Math.abs(f.flow_4w_mn)/maxRF*100;
    return`<div class="flow-row">
      <div class="fl-label">${reg}</div>
      <div class="fl-sub" style="color:var(--muted)">${f.n_etfs}e</div>
      <div class="fl-bar-wrap"><div class="fl-bar" style="width:${w}%;background:${pos?"var(--green)":"var(--red)"}"></div></div>
      <div class="fl-val ${pos?"pos":"neg"}">${fmtB(f.flow_4w_mn)}</div>
    </div>`;
  }).join("");
}

function renderCountries(){
  const tf=D.ticker_flows||{};
  document.getElementById("countries").innerHTML=D.countries.map(c=>{
    const ma=maCls(c.ma_signal);
    const fl=tf[c.ticker];
    const flowHtml=fl?`<div class="c-flow ${fl.flow_4w_mn>=0?"pos":"neg"}">${fmtB(fl.flow_4w_mn)}</div>`
                     :`<div class="c-flow neu">—</div>`;
    return`<div class="c-row">
      <div class="c-flag">${c.name.split(" ")[0]}</div>
      <div class="c-name">${c.name.split(" ").slice(1).join(" ")}</div>
      <div class="c-val ${sc(c.ret_1m)}">${fmt(c.ret_1m)}</div>
      <div class="c-val neu" style="font-size:11px">RS ${fmt(c.rs_vs_spy,1)}</div>
      <div class="c-ma ${ma}">${c.ma_signal}</div>
      ${flowHtml}
    </div>`;
  }).join("");
}

function renderSectors(){
  const mx=Math.max(...D.sectors.map(s=>Math.abs(s.rs)),1);
  document.getElementById("sectors").innerHTML=D.sectors.map((s,i)=>{
    const pos=s.rs>=0;
    return`<div class="s-row">
      <div class="s-rank">${i+1}</div>
      <div class="s-name">${s.name}</div>
      <div class="s-bar-wrap"><div class="s-bar" style="width:${Math.abs(s.rs)/mx*100}%;background:${pos?"var(--green)":"var(--red)"}"></div></div>
      <div class="s-rs ${pos?"pos":"neg"}">${fmt(s.rs,1)}</div>
    </div>`;
  }).join("");
}

load();
</script>
</body>
</html>
