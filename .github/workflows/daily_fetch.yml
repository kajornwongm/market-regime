name: Market Regime Daily Update

on:
  schedule:
    - cron: "30 22 * * 1-5"   # 22:30 UTC = หลัง US market close
  workflow_dispatch:            # รันด้วยมือได้

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run fetcher
        run: python fetch.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: regime update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
