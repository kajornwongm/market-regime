name: Market Regime Weekly Update

on:
  schedule:
    - cron: "0 14 * * 6"   # Saturday 14:00 UTC (21:00 Bangkok)
                             # after etfdb.com updates weekly flow data
  workflow_dispatch:         # manual trigger (e.g. after uploading new CSV)

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run fetch.py (ETF flow data + regime)
        run: python fetch.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/flows/
          git diff --staged --quiet || git commit -m "data: weekly flow update $(date -u '+%Y-%m-%d')"
          git push

# ─────────────────────────────────────────────────────
# This workflow produces ETF flow data (data/latest.json) consumed by the
# dashboard Flow tab. The RS rotation signal is handled separately by
# monthly_fetch.yml (auto-runs rs_signal.py → data/rs_latest.json).
#
# Two independent data feeds, two independent files:
#   fetch.py     → data/latest.json    (flow + regime, weekly)
#   rs_signal.py → data/rs_latest.json (RS rotation signal, monthly)
# ─────────────────────────────────────────────────────
